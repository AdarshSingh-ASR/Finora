<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Finora turns payment alerts into a financial report</title>
  <desc id="desc">Animated UPI notifications travel from a phone through the Finora AI core and become a categorized spending report.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#e9faf4"/><stop offset="1" stop-color="#c7eee2"/></linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#00d8ad"/><stop offset=".55" stop-color="#5bd4b3"/><stop offset="1" stop-color="#10231c"/></linearGradient>
    <linearGradient id="line" x1="0" x2="1"><stop stop-color="#16b88b"/><stop offset="1" stop-color="#087d61"/></linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#07110c" flood-opacity=".25"/></filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <path id="route-a" d="M300 225 C400 225 445 275 520 290"/>
    <path id="route-b" d="M300 310 C395 310 445 305 520 305"/>
    <path id="route-c" d="M300 395 C400 395 445 345 520 320"/>
    <path id="route-report" d="M696 305 C735 305 760 305 795 305"/>
    <style>
      text{font-family:Arial,sans-serif;fill:#173027} .mono{font-family:monospace;letter-spacing:.12em;font-size:10px;font-weight:700}
      .route{fill:none;stroke:#168b6b;stroke-width:2;stroke-dasharray:5 8;opacity:.5}.route.report{stroke:#7789e9}
      .note{font-size:11px;fill:#688077}.merchant{font-weight:700;font-size:13px}.meta{font-size:10px;fill:#8a9990}.amount{font-size:12px;font-weight:700}.time{font-size:10px;fill:#8a9990}
      .particle{animation:travel 3.5s linear infinite}.p2{animation-delay:1.1s}.p3{animation-delay:2.2s}.p4{animation-duration:2.3s;animation-delay:.7s}
      @keyframes travel{from{offset-distance:0%;opacity:0}10%{opacity:1}90%{opacity:1}to{offset-distance:100%;opacity:0}}
      .notification{animation:rise 4s ease-in-out infinite}.n2{animation-delay:.7s}.n3{animation-delay:1.4s}.n4{animation-delay:2.1s}
      @keyframes rise{0%,100%{transform:translateY(8px);opacity:.45}35%,75%{transform:translateY(0);opacity:1}}
      .orbit{transform-origin:608px 304px;animation:spin 8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
      .report-trend{stroke-dasharray:420;stroke-dashoffset:420;animation:draw 3.5s ease-in-out infinite}@keyframes draw{45%,75%{stroke-dashoffset:0}to{stroke-dashoffset:420}}
      .bar{transform-box:fill-box;transform-origin:left center;animation:bars 3.5s ease-in-out infinite}.bar2{animation-delay:.2s}.bar3{animation-delay:.4s}@keyframes bars{0%,100%{transform:scaleX(.35)}45%,75%{transform:scaleX(1)}}
    </style>
  </defs>
  <rect width="1200" height="620" rx="30" fill="url(#bg)"/>
  <g opacity=".08" stroke="#2d2923"><path d="M0 78h1200M0 156h1200M0 234h1200M0 312h1200M0 390h1200M0 468h1200M0 546h1200"/><path d="M86 0v620M172 0v620M258 0v620M344 0v620M430 0v620M516 0v620M602 0v620M688 0v620M774 0v620M860 0v620M946 0v620M1032 0v620M1118 0v620"/></g>
  <g filter="url(#shadow)"><rect x="54" y="70" width="262" height="466" rx="42" fill="#0b120e" stroke="#3d5b4b" stroke-width="2"/><rect x="72" y="94" width="226" height="414" rx="30" fill="#f7fbf8"/><rect x="137" y="80" width="96" height="20" rx="10" fill="#0b120e"/><rect x="72" y="94" width="226" height="79" rx="30" fill="#e8fff4"/><text x="91" y="123" class="mono">12:42</text><text x="91" y="151" font-size="14" font-weight="700">Payment activity</text><text x="91" y="169" class="note">UPI notifications</text>
    <g class="notification"><rect x="86" y="188" width="198" height="68" rx="14" fill="#fff" stroke="#dce8e1"/><circle cx="108" cy="211" r="11" fill="#16b88b"/><text x="128" y="209" class="merchant">Swiggy</text><text x="128" y="228" class="meta">Paid via UPI</text><text x="264" y="213" text-anchor="end" class="amount">₹642</text><text x="264" y="233" text-anchor="end" class="time">12:39 PM</text></g>
    <g class="notification n2"><rect x="86" y="266" width="198" height="68" rx="14" fill="#fff" stroke="#dce8e1"/><circle cx="108" cy="289" r="11" fill="#5f7cff"/><text x="128" y="287" class="merchant">Uber India</text><text x="128" y="306" class="meta">Paid via UPI</text><text x="264" y="291" text-anchor="end" class="amount">₹318</text><text x="264" y="311" text-anchor="end" class="time">11:08 AM</text></g>
    <g class="notification n3"><rect x="86" y="344" width="198" height="68" rx="14" fill="#fff" stroke="#dce8e1"/><circle cx="108" cy="367" r="11" fill="#34bd82"/><text x="128" y="365" class="merchant">Reliance Fresh</text><text x="128" y="384" class="meta">Paid via UPI</text><text x="264" y="369" text-anchor="end" class="amount">₹1,284</text><text x="264" y="389" text-anchor="end" class="time">9:22 AM</text></g>
    <g class="notification n4"><rect x="86" y="422" width="198" height="68" rx="14" fill="#fff" stroke="#dce8e1"/><circle cx="108" cy="445" r="11" fill="#00d8ad"/><text x="128" y="443" class="merchant">Netflix</text><text x="128" y="462" class="meta">Recurring payment</text><text x="264" y="447" text-anchor="end" class="amount">₹649</text><text x="264" y="467" text-anchor="end" class="time">Yesterday</text></g><rect x="145" y="518" width="80" height="4" rx="2" fill="#577064"/></g>
  <g class="mono"><rect x="22" y="38" width="143" height="28" rx="14" fill="#f7fbf8" stroke="#9fcfc0"/><text x="94" y="56" text-anchor="middle">ANY BANK STATEMENT</text><rect x="174" y="38" width="73" height="28" rx="14" fill="#16b88b"/><text x="210" y="56" text-anchor="middle" fill="#fff">UPI LIVE</text></g>
  <g class="route"><use href="#route-a"/><use href="#route-b"/><use href="#route-c"/><use class="report" href="#route-report"/></g>
  <g fill="#00d8ad"><circle class="particle" r="6" style="offset-path:path('M300 225 C400 225 445 275 520 290')"/><circle class="particle p2" r="5" fill="#5bd4b3" style="offset-path:path('M300 310 C395 310 445 305 520 305')"/><circle class="particle p3" r="5" fill="#10231c" style="offset-path:path('M300 395 C400 395 445 345 520 320')"/><circle class="particle p4" r="6" fill="#16b88b" style="offset-path:path('M696 305 C735 305 760 305 795 305')"/></g>
  <g filter="url(#glow)"><circle cx="608" cy="304" r="89" fill="#15241c" stroke="url(#core)" stroke-width="2"/><circle class="orbit" cx="608" cy="215" r="6" fill="#00d8ad"/><rect x="564" y="260" width="88" height="88" rx="25" fill="url(#core)" transform="rotate(8 608 304)"/><rect x="576" y="272" width="64" height="64" rx="19" fill="#14231c"/><text x="608" y="319" text-anchor="middle" font-size="46" font-weight="800" fill="#fff">F</text></g><text x="608" y="417" text-anchor="middle" class="mono">FINORA AI CORE</text><text x="608" y="438" text-anchor="middle" class="note">read · normalize · explain</text>
  <g filter="url(#shadow)"><rect x="792" y="48" width="362" height="524" rx="24" fill="#fbfdfb" stroke="#dce8e1"/><rect x="792" y="48" width="362" height="64" rx="24" fill="#e9fff4"/><circle cx="824" cy="79" r="15" fill="#14231c"/><text x="824" y="85" text-anchor="middle" font-size="16" font-weight="800" fill="#fff">F</text><text x="850" y="76" font-size="14" font-weight="700">July money report</text><text x="850" y="94" class="note">Built from 86 transactions</text><rect x="1065" y="67" width="67" height="22" rx="11" fill="#79f5d2"/><text x="1099" y="81" text-anchor="middle" class="mono" font-size="8">SAMPLE</text><text x="818" y="143" class="mono">TOTAL SPENT</text><text x="818" y="177" font-size="28" font-weight="800">₹38,240</text><text x="818" y="198" font-size="11" fill="#168b6b">↓ 8.4% from June</text><text x="1012" y="143" class="mono">SAVINGS RATE</text><text x="1012" y="176" font-size="28" font-weight="800">24%</text><rect x="818" y="220" width="310" height="142" rx="15" fill="#f3f7f4"/><text x="836" y="244" font-size="12" font-weight="700">Spending over time</text><path d="M836 329 C865 320 879 324 901 307 S944 312 965 285 S1007 296 1028 269 S1078 279 1110 252" class="report-trend" fill="none" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/><text x="818" y="395" font-size="12" font-weight="700">Top categories</text><text x="818" y="424" font-size="11">Food</text><rect x="882" y="413" width="215" height="13" rx="7" fill="#e4ebe7"/><rect class="bar" x="882" y="413" width="168" height="13" rx="7" fill="#38c98f"/><text x="1127" y="424" text-anchor="end" font-size="11">₹12.6k</text><text x="818" y="455" font-size="11">Shopping</text><rect x="882" y="444" width="215" height="13" rx="7" fill="#e4ebe7"/><rect class="bar bar2" x="882" y="444" width="112" height="13" rx="7" fill="#6681ff"/><text x="1127" y="455" text-anchor="end" font-size="11">₹8.4k</text><text x="818" y="486" font-size="11">Travel</text><rect x="882" y="475" width="215" height="13" rx="7" fill="#e4ebe7"/><rect class="bar bar3" x="882" y="475" width="77" height="13" rx="7" fill="#79f5d2"/><text x="1127" y="486" text-anchor="end" font-size="11">₹5.8k</text><rect x="818" y="515" width="310" height="37" rx="11" fill="#14231c"/><text x="850" y="536" font-size="11" fill="#fff">Food delivery rose 18% this month</text></g>
</svg>
